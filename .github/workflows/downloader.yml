name: Universal Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Enter URLs (one per line, or separated by space/comma)'
        required: true
        type: string
      quality:
        description: 'Video quality (for YouTube and similar platforms)'
        required: false
        default: '480p'
        type: choice
        options:
          - '480p'
          - '720p'
          - '360p'
          - 'Audio (MP3)'
          - 'Best'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq wget aria2

      - name: Check if yt-dlp is needed
        id: check
        run: |
          NEED_YT=false
          IFS=$'\n'
          for URL in $(echo "${{ github.event.inputs.urls }}" | tr ',' '\n' | tr ' ' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'); do
            if [[ "$URL" =~ (youtube\.com|youtu\.be|soundcloud\.com|on\.soundcloud\.com|x\.com|twitter\.com|instagram\.com|tiktok\.com) ]]; then
              NEED_YT=true
              break
            fi
          done
          echo "need_yt=$NEED_YT" >> $GITHUB_OUTPUT

      - name: Install yt-dlp (if needed)
        if: steps.check.outputs.need_yt == 'true'
        run: |
          pip install yt-dlp

      - name: Setup YouTube Cookies (if exists)
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube_cookies.txt
          else
            touch youtube_cookies.txt
          fi

      - name: Process URLs
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          QUALITY="${{ github.event.inputs.quality }}"
          
          # Quality mapping for yt-dlp
          if [[ "$QUALITY" == "720p" ]]; then
            YTDLP_F="-f bestvideo[ext=mp4][height<=720]+bestaudio[ext=m4a]/best[ext=mp4][height<=720]/best --merge-output-format mp4"
          elif [[ "$QUALITY" == "480p" ]]; then
            YTDLP_F="-f bestvideo[ext=mp4][height<=480]+bestaudio[ext=m4a]/best[ext=mp4][height<=480]/best --merge-output-format mp4"
          elif [[ "$QUALITY" == "360p" ]]; then
            YTDLP_F="-f bestvideo[ext=mp4][height<=360]+bestaudio[ext=m4a]/best[ext=mp4][height<=360]/best --merge-output-format mp4"
          elif [[ "$QUALITY" == "Audio (MP3)" ]]; then
            YTDLP_F="-x --audio-format mp3"
          else
            YTDLP_F="--merge-output-format mp4"
          fi

          # Temporary directory for downloads
          rm -rf tmp_downloads
          mkdir -p tmp_downloads

          # Process each URL
          IFS=$'\n'
          for URL in $(echo "${{ github.event.inputs.urls }}" | tr ',' '\n' | tr ' ' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'); do
            [ -z "$URL" ] && continue
            echo "========================================="
            echo "Processing: $URL"
            echo "========================================="
            
            # Platform detection
            if echo "$URL" | grep -qE "(youtube\.com|youtu\.be|soundcloud\.com|on\.soundcloud\.com|x\.com|twitter\.com|instagram\.com|tiktok\.com)"; then
              echo "Platform URL → using yt-dlp"
              COOKIE_ARG=""
              [ -s youtube_cookies.txt ] && COOKIE_ARG="--cookies youtube_cookies.txt"
              yt-dlp $COOKIE_ARG $YTDLP_F -o "tmp_downloads/%(title)s.%(ext)s" "$URL"
            else
              echo "Direct file → using aria2"
              aria2c --split=2 --max-connection-per-server=2 --dir="tmp_downloads" "$URL"
            fi
          done

      - name: Move files to platform folders
        run: |
          # Create platform folders
          mkdir -p downloads/soundcloud downloads/twitter downloads/youtube downloads/instagram downloads/tiktok downloads/files
          
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            FILENAME=$(basename "$FILE")
            
            # Detect platform from URL or filename (fallback to files folder)
            if [[ "$FILENAME" == *"youtube"* ]] || [[ "$FILENAME" == *"yt"* ]]; then
              mv "$FILE" "downloads/youtube/$FILENAME"
            elif [[ "$FILENAME" == *"soundcloud"* ]] || [[ "$FILENAME" == *"sc"* ]]; then
              mv "$FILE" "downloads/soundcloud/$FILENAME"
            elif [[ "$FILENAME" == *"twitter"* ]] || [[ "$FILENAME" == *"x.com"* ]]; then
              mv "$FILE" "downloads/twitter/$FILENAME"
            elif [[ "$FILENAME" == *"instagram"* ]] || [[ "$FILENAME" == *"ig"* ]]; then
              mv "$FILE" "downloads/instagram/$FILENAME"
            elif [[ "$FILENAME" == *"tiktok"* ]] || [[ "$FILENAME" == *"tt"* ]]; then
              mv "$FILE" "downloads/tiktok/$FILENAME"
            else
              mv "$FILE" "downloads/files/$FILENAME"
            fi
          done
          rm -rf tmp_downloads

      - name: Zip large files (90MB limit, no password)
        run: |
          LIMIT=$((90 * 1024 * 1024))
          
          # Find all files in downloads folder and its subfolders
          find downloads -type f | while read -r FILE; do
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            DIR=$(dirname "$FILE")
            
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "File is larger than 90MB, splitting: $BASENAME"
              cd "$DIR"
              zip -s 90m "${BASENAME}.zip" -j "$BASENAME"
              rm -f "$BASENAME"
              cd - > /dev/null
            fi
          done

      - name: Update Links.md
        run: |
          cat > Links.md << 'EOF'
# 📦 Download Links

This file contains direct download links for every file in the `downloads/` folder.
All timestamps are in **UTC (Greenwich Mean Time)**.

| # | File | Platform | Size | Published (UTC) | Link |
|---|------|----------|------|----------------|------|
EOF

          REPO="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"
          COUNTER=1
          
          # Find all files (including subfolders)
          find downloads -type f | while read -r FILE; do
            SIZE=$(stat -c%s "$FILE")
            SIZE_MB=$(echo "scale=1; $SIZE / 1048576" | bc)
            SIZE_STR="${SIZE_MB} MB"
            if (( $(echo "$SIZE_MB < 1" | bc -l) )); then
              SIZE_KB=$((SIZE / 1024))
              SIZE_STR="${SIZE_KB} KB"
            fi
            
            # Get relative path and encode
            REL_PATH="${FILE#./}"
            ENCODED_PATH=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.stdin.read().strip()))" <<< "$REL_PATH")
            RAW_URL="https://github.com/$REPO/raw/$BRANCH/$ENCODED_PATH"
            
            # Determine platform
            if [[ "$REL_PATH" == *"/soundcloud/"* ]]; then
              PLATFORM="SoundCloud"
            elif [[ "$REL_PATH" == *"/twitter/"* ]]; then
              PLATFORM="Twitter"
            elif [[ "$REL_PATH" == *"/youtube/"* ]]; then
              PLATFORM="YouTube"
            elif [[ "$REL_PATH" == *"/instagram/"* ]]; then
              PLATFORM="Instagram"
            elif [[ "$REL_PATH" == *"/tiktok/"* ]]; then
              PLATFORM="TikTok"
            elif [[ "$REL_PATH" == *"/files/"* ]]; then
              PLATFORM="Direct Link"
            else
              PLATFORM="Other"
            fi
            
            FILENAME=$(basename "$FILE")
            TIME_NOW=$(date -u +"%Y-%m-%d %H:%M:%S")
            
            printf "| %d | %s | %s | %s | %s | [Download](%s) |\n" \
              "$COUNTER" "$FILENAME" "$PLATFORM" "$SIZE_STR" "$TIME_NOW" "$RAW_URL" >> Links.md
            
            COUNTER=$((COUNTER + 1))
          done

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ Links.md
          git diff --cached --quiet || git commit -m "Add downloaded content [skip ci]"
          git push
