name: Universal Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Enter URLs (one per line)'
        required: true
        type: string
      # YouTube is temporarily disabled - will be re-enabled later
      # youtube_quality:
      #   description: 'YouTube quality (for video entries)'
      #   required: false
      #   default: '480p'
      #   type: choice
      #   options:
      #     - '144p'
      #     - '240p'
      #     - '360p'
      #     - '480p'
      #     - '720p'
      #     - '1080p'
      #     - 'best'
      #     - 'audio'
      twitter_profile_count:
        description: 'Number of tweets for Twitter profile (max 50)'
        required: false
        default: '20'
        type: string
      # Instagram is temporarily disabled - will be re-enabled later
      # instagram_profile_count:
      #   description: 'Number of posts for Instagram profile (max 30)'
      #   required: false
      #   default: '10'
      #   type: string
      youtube_channel_count:
        description: 'Number of videos for YouTube channel (max 50)'
        required: false
        default: '10'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip uninstall -y yt-dlp || true
          pip install --upgrade --pre yt-dlp[default]

      - name: Setup PO Token Provider
        run: |
          docker run -d --name bgutil-provider -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider:latest
          sleep 5
          echo "BGUTIL_PROVIDER=http://localhost:4416" >> $GITHUB_ENV

      - name: Process URLs
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
        run: |
          # Helper to detect platform
          # Make all scripts executable
          chmod +x scripts/soundcloud/*.sh
          chmod +x scripts/twitter/*.sh
          chmod +x scripts/youtube/*.sh
          chmod +x scripts/instagram/*.sh
          chmod +x scripts/tiktok/*.sh
          
          detect_platform() {
              local url="$1"
              if [[ "$url" == *"soundcloud.com"* ]] || [[ "$url" == *"on.soundcloud.com"* ]] || [[ "$url" == *"snd.sc"* ]]; then
                  echo "soundcloud"
              elif [[ "$url" == *"x.com"* ]] || [[ "$url" == *"twitter.com"* ]] || [[ "$url" == *"t.co"* ]]; then
                  echo "twitter"
              elif [[ "$url" == *"youtu.be"* ]] || [[ "$url" == *"youtube.com"* ]] || [[ "$url" == *"m.youtube.com"* ]]; then
                  echo "youtube"
              elif [[ "$url" == *"instagram.com"* ]] || [[ "$url" == *"instagr.am"* ]] || [[ "$url" == *"ig.me"* ]]; then
                  echo "instagram"
              elif [[ "$url" == *"tiktok.com"* ]] || [[ "$url" == *"vm.tiktok.com"* ]] || [[ "$url" == *"vt.tiktok.com"* ]]; then
                  echo "tiktok"
              else
                  echo "unknown"
              fi
          }

          IFS=$'\n'
          for URL in $(echo "${{ github.event.inputs.urls }}" | tr ',' '\n' | tr ' ' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'); do
            [ -z "$URL" ] && continue
            echo "========================================="
            echo "Processing: $URL"
            PLATFORM=$(detect_platform "$URL")
            echo "Platform: $PLATFORM"
            
            case "$PLATFORM" in
              soundcloud)
                if [[ "$URL" == *"/sets/"* ]]; then
                  ./scripts/soundcloud/album.sh "$URL"
                else
                  ./scripts/soundcloud/single.sh "$URL"
                fi
                ;;
              twitter)
                if [[ "$URL" == *"/status/"* ]]; then
                  ./scripts/twitter/single.sh "$URL"
                else
                  ./scripts/twitter/profile.sh "$URL" "${{ github.event.inputs.twitter_profile_count }}"
                fi
                ;;
              youtube)
                echo "⚠️ YouTube download is temporarily disabled. Check back later."
                ;;
              instagram)
                echo "⚠️ Instagram download is temporarily disabled. Check back later."
                ;;
              tiktok)
                ./scripts/tiktok/single.sh "$URL"
                ;;
              *)
                echo "WARNING: Unsupported platform for $URL"
                ;;
            esac
          done

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git diff --cached --quiet || git commit -m "Add downloaded content [skip ci]"
          git pull --rebase origin main || true
          git push

      - name: Display summary
        run: |
          echo "========================================="
          echo "Download summary"
          echo "========================================="
          for dir in downloads/*/; do
            [ -d "$dir" ] && echo "📁 $(basename "$dir"): $(ls -1 "$dir" | wc -l) items"
          done
