name: Universal Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  detect-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract links by platform
        id: extract
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          echo "$MSG" | grep -oP 'sc:\s*https?://[^\s]+' > sc_urls.txt || true
          echo "$MSG" | grep -oP 'ig:\s*https?://[^\s]+' > ig_urls.txt || true
          echo "$MSG" | grep -oP 'tt:\s*https?://[^\s]+' > tt_urls.txt || true
          echo "$MSG" | grep -oP 'tw:\s*https?://[^\s]+' > tw_urls.txt || true
          
          echo "SC: $(wc -l < sc_urls.txt)"
          echo "IG: $(wc -l < ig_urls.txt)"
          echo "TT: $(wc -l < tt_urls.txt)"
          echo "TW: $(wc -l < tw_urls.txt)"

      - name: Setup dependencies (shared cache)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install yt-dlp

      - name: Dispatch to SoundCloud
        run: |
          while IFS= read -r line; do
            URL=$(echo "$line" | sed 's/^sc:\s*//')
            if [[ -n "$URL" ]]; then
              echo "Dispatching to SoundCloud: $URL"
              gh workflow run platforms/soundcloud.yml -f url="$URL"
            fi
          done < sc_urls.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch to Instagram
        run: |
          while IFS= read -r line; do
            URL=$(echo "$line" | sed 's/^ig:\s*//')
            if [[ -n "$URL" ]]; then
              echo "Dispatching to Instagram: $URL"
              # gh workflow run platforms/instagram.yml -f url="$URL"
              echo "Instagram workflow not yet implemented"
            fi
          done < ig_urls.txt

      - name: Dispatch to TikTok
        run: |
          while IFS= read -r line; do
            URL=$(echo "$line" | sed 's/^tt:\s*//')
            if [[ -n "$URL" ]]; then
              echo "Dispatching to TikTok: $URL"
              echo "TikTok workflow not yet implemented"
            fi
          done < tt_urls.txt

      - name: Dispatch to Twitter
        run: |
          while IFS= read -r line; do
            URL=$(echo "$line" | sed 's/^tw:\s*//')
            if [[ -n "$URL" ]]; then
              echo "Dispatching to Twitter: $URL"
              echo "Twitter workflow not yet implemented"
            fi
          done < tw_urls.txt
