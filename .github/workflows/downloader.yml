name: Universal Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  detect-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract SoundCloud links
        id: extract
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          echo "$MSG" | grep -oP 'sc:\s*https?://[^\s]+' | sed 's/^sc:\s*//' > sc_urls.txt
          echo "Found $(wc -l < sc_urls.txt) SoundCloud link(s)"

      - name: Dispatch to SoundCloud platform
        run: |
          while IFS= read -r URL; do
            if [[ -n "$URL" ]]; then
              echo "Dispatching: $URL"
              gh workflow run platforms/soundcloud.yml -f url="$URL"
              sleep 2
            fi
          done < sc_urls.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
