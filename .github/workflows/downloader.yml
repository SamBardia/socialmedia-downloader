name: Universal Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Enter URLs (one per line, or separated by space/comma)'
        required: true
        type: string
      # twitter_profile_count:
      #   description: 'Number of tweets for Twitter profile (max 50)'
      #   required: false
      #   default: '20'
      #   type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect URL types
        id: detect
        run: |
          URLS="${{ github.event.inputs.urls }}"
          HAS_PLATFORM=false
          
          if [[ "$URLS" =~ (youtube\.com|youtu\.be|soundcloud\.com|on\.soundcloud\.com|x\.com|twitter\.com|instagram\.com|tiktok\.com) ]]; then
            HAS_PLATFORM=true
          fi
          
          echo "has_platform=$HAS_PLATFORM" >> $GITHUB_OUTPUT
          echo "Detected platform URLs: $HAS_PLATFORM"

      - name: Restore timestamp cache
        uses: actions/cache/restore@v4
        with:
          path: .links_cache.txt
          key: links-cache-${{ github.run_id }}
          restore-keys: |
            links-cache-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget aria2 p7zip-full
          
          if [ "${{ steps.detect.outputs.has_platform }}" = "true" ]; then
            echo "Platform URLs detected, installing full dependencies..."
            sudo apt-get install -y ffmpeg zip jq bc
            pip install yt-dlp
          else
            echo "Only direct links detected, skipping heavy dependencies."
          fi

      - name: Make scripts executable
        run: |
          chmod +x scripts/soundcloud/*.sh 2>/dev/null || true
          chmod +x scripts/twitter/*.sh 2>/dev/null || true
          chmod +x scripts/youtube/*.sh 2>/dev/null || true
          chmod +x scripts/instagram/*.sh 2>/dev/null || true
          chmod +x scripts/tiktok/*.sh 2>/dev/null || true
          chmod +x scripts/downloader-core.sh 2>/dev/null || true
          chmod +x scripts/create_links.sh 2>/dev/null || true

      - name: Setup YouTube Cookies (if exists)
        if: steps.detect.outputs.has_platform == 'true'
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube_cookies.txt
          else
            touch youtube_cookies.txt
          fi

      - name: Process URLs
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          TWITTER_PROFILE_COUNT: ${{ github.event.inputs.twitter_profile_count }}
          MAX_SIZE_MB: 90
          HAS_PLATFORM: ${{ steps.detect.outputs.has_platform }}
        run: |
          split_large_file() {
            local file="$1"
            local max_mb="$2"
            local size=$(du -b "$file" | cut -f1)
            local max_bytes=$((max_mb * 1024 * 1024))
            
            if [ "$size" -gt "$max_bytes" ]; then
              echo "Splitting large file: $file (size=$(numfmt --to=iec $size))"
              local dir=$(dirname "$file")
              local base=$(basename "$file")
              local name_no_ext="${base%.*}"
              
              cd "$dir"
              7z a -v"${max_mb}m" -mx0 "${name_no_ext}.7z" "$base"
              rm -f "$base"
              cd - > /dev/null
              
              echo "Split complete. Parts:"
              ls -la "$dir/${name_no_ext}.7z."* 2>/dev/null | awk '{print "  " $9 " (" $5 " bytes)"}'
              return 0
            else
              echo "File size within limit, no split needed."
              return 0
            fi
          }

          mkdir -p tmp_downloads

          IFS=$'\n'
          for URL in $(echo "${{ github.event.inputs.urls }}" | tr ',' '\n' | tr ' ' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'); do
            [ -z "$URL" ] && continue
            echo "========================================="
            echo "Processing: $URL"
            echo "========================================="

            if [[ "$URL" =~ (youtube\.com|youtu\.be|soundcloud\.com|on\.soundcloud\.com|x\.com|twitter\.com|instagram\.com|tiktok\.com) ]]; then
              if [ "$HAS_PLATFORM" = "true" ]; then
                echo "Platform URL -> using existing scripts"
                ./scripts/downloader-core.sh "$URL"
              else
                echo "ERROR: Platform URL detected but dependencies not installed."
                exit 1
              fi
            else
              echo "Direct file -> using aria2"
              aria2c --split=2 --max-connection-per-server=2 --dir="tmp_downloads" "$URL"
              for FILE in tmp_downloads/*; do
                if [ -f "$FILE" ]; then
                  FILENAME=$(basename "$FILE")
                  mkdir -p downloads/files
                  mv "$FILE" "downloads/files/$FILENAME"
                  split_large_file "downloads/files/$FILENAME" "$MAX_SIZE_MB"
                fi
              done
            fi

            if [ -f "./scripts/create_links.sh" ]; then
              chmod +x ./scripts/create_links.sh
              ./scripts/create_links.sh
            else
              echo "WARNING: create_links.sh not found, skipping links update."
            fi
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add downloads/ Links.md Links.fa.md .links_cache.txt 2>/dev/null || true
            git diff --cached --quiet || git commit -m "Add downloaded content and update links [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          done
          rm -rf tmp_downloads

      - name: Final verification
        if: always()
        run: |
          chmod +x scripts/create_links.sh 2>/dev/null || true
          
          if [ -d "downloads" ]; then
            MAX_SIZE_MB=90
            find downloads -type f -size +${MAX_SIZE_MB}M -print0 | while IFS= read -r -d '' file; do
              echo "Found leftover large file: $file - splitting now."
              dir=$(dirname "$file")
              base=$(basename "$file")
              name_no_ext="${base%.*}"
              cd "$dir"
              7z a -v"${MAX_SIZE_MB}m" -mx0 "${name_no_ext}.7z" "$base"
              rm -f "$base"
              cd - > /dev/null
            done
          fi
          
          if [ -f "./scripts/create_links.sh" ]; then
            chmod +x ./scripts/create_links.sh
            ./scripts/create_links.sh
          fi

      - name: Final push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ Links.md Links.fa.md .links_cache.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Final update after splitting [skip ci]"
          git pull --rebase --autostash origin main || true
          git push

      - name: Save timestamp cache
        uses: actions/cache/save@v4
        with:
          path: .links_cache.txt
          key: links-cache-${{ github.run_id }}

      - name: Display summary
        run: |
          echo "========================================="
          echo "Download summary"
          echo "========================================="
          if [ -d "downloads" ]; then
            for dir in downloads/*/; do
              [ -d "$dir" ] && echo "$(basename "$dir"): $(ls -1 "$dir" | wc -l) items"
            done
          else
            echo "No downloads folder found."
          fi
