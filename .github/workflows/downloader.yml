name: Universal Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  parse-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract SoundCloud URLs
        id: extract
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          URLS=$(echo "$MSG" | grep -oP 'sc:\s*\Khttps?://[^\s]+' | tr '\n' ',')
          echo "urls=${URLS%,}" >> $GITHUB_OUTPUT
          if [ -n "$URLS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger SoundCloud workflow
        if: steps.extract.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'soundcloud.yml',
              ref: 'main',
              inputs: {
                urls: '${{ steps.extract.outputs.urls }}'
              }
            })
