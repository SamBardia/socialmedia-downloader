name: Universal Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Enter URLs (one per line)'
        required: true
        type: string
      twitter_profile_count:
        description: 'Number of tweets for Twitter profile (max 50)'
        required: false
        default: '20'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq bc
          pip install yt-dlp

      - name: Process URLs
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
        run: |
          # Make all scripts executable
          chmod +x scripts/soundcloud/*.sh
          chmod +x scripts/twitter/*.sh
          chmod +x scripts/youtube/*.sh
          chmod +x scripts/instagram/*.sh
          chmod +x scripts/tiktok/*.sh
          
          detect_platform() {
              local url="$1"
              if [[ "$url" == *"soundcloud.com"* ]] || [[ "$url" == *"on.soundcloud.com"* ]] || [[ "$url" == *"snd.sc"* ]]; then
                  echo "soundcloud"
              elif [[ "$url" == *"x.com"* ]] || [[ "$url" == *"twitter.com"* ]] || [[ "$url" == *"t.co"* ]]; then
                  echo "twitter"
              elif [[ "$url" == *"youtu.be"* ]] || [[ "$url" == *"youtube.com"* ]] || [[ "$url" == *"m.youtube.com"* ]]; then
                  echo "youtube"
              elif [[ "$url" == *"instagram.com"* ]] || [[ "$url" == *"instagr.am"* ]] || [[ "$url" == *"ig.me"* ]]; then
                  echo "instagram"
              elif [[ "$url" == *"tiktok.com"* ]] || [[ "$url" == *"vm.tiktok.com"* ]] || [[ "$url" == *"vt.tiktok.com"* ]]; then
                  echo "tiktok"
              else
                  echo "unknown"
              fi
          }

          IFS=$'\n'
          for URL in $(echo "${{ github.event.inputs.urls }}" | tr ',' '\n' | tr ' ' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'); do
            [ -z "$URL" ] && continue
            echo "========================================="
            echo "Processing: $URL"
            PLATFORM=$(detect_platform "$URL")
            echo "Platform: $PLATFORM"
            
            case "$PLATFORM" in
              soundcloud)
                if [[ "$URL" == *"/sets/"* ]]; then
                  ./scripts/soundcloud/album.sh "$URL"
                elif [[ "$URL" =~ ^https?://soundcloud\.com/[^/]+/?$ ]]; then
                  echo "Artist profile detected. Downloading full archive."
                  ./scripts/soundcloud/artist.sh "$URL"
                else
                  ./scripts/soundcloud/single.sh "$URL"
                fi
                ;;
              twitter)
                if [[ "$URL" == *"/status/"* ]]; then
                  ./scripts/twitter/single.sh "$URL"
                else
                  ./scripts/twitter/profile.sh "$URL" "${{ github.event.inputs.twitter_profile_count }}"
                fi
                ;;
              youtube)
                echo "⚠️ YouTube download is temporarily disabled. Check back later."
                ;;
              instagram)
                echo "⚠️ Instagram download is temporarily disabled. Check back later."
                ;;
              tiktok)
                ./scripts/tiktok/single.sh "$URL"
                ;;
              *)
                echo "WARNING: Unsupported platform for $URL"
                ;;
            esac
          done

      - name: Create download links
        run: |
          chmod +x scripts/create_links.sh
          ./scripts/create_links.sh

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ Links.md Links.fa.md
          git diff --cached --quiet || git commit -m "Add downloaded content and update links [skip ci]"
          git pull --rebase origin main || true
          git push

      - name: Display summary
        run: |
          echo "========================================="
          echo "Download summary"
          echo "========================================="
          for dir in downloads/*/; do
            [ -d "$dir" ] && echo "📁 $(basename "$dir"): $(ls -1 "$dir" | wc -l) items"
          done
