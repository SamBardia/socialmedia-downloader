name: Universal Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Enter URLs (one per line, or separated by space/comma)'
        required: true
        type: string
      twitter_profile_count:
        description: 'Number of tweets for Twitter profile (max 50)'
        required: false
        default: '20'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore timestamp cache
        uses: actions/cache/restore@v4
        with:
          path: .links_cache.txt
          key: links-cache-${{ github.run_id }}
          restore-keys: |
            links-cache-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq bc wget aria2
          pip install yt-dlp

      - name: Make scripts executable
        run: |
          chmod +x scripts/soundcloud/*.sh 2>/dev/null || true
          chmod +x scripts/twitter/*.sh 2>/dev/null || true
          chmod +x scripts/youtube/*.sh 2>/dev/null || true
          chmod +x scripts/instagram/*.sh 2>/dev/null || true
          chmod +x scripts/tiktok/*.sh 2>/dev/null || true
          chmod +x scripts/downloader-core.sh 2>/dev/null || true
          chmod +x scripts/create_links.sh 2>/dev/null || true

      - name: Setup YouTube Cookies (if exists)
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube_cookies.txt
          else
            touch youtube_cookies.txt
          fi
