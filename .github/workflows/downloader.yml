name: Universal Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  detect-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract SoundCloud links
        id: extract
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          echo "$MSG" | grep -oP 'sc:\s*https?://[^\s]+' | sed 's/^sc:\s*//' > sc_urls.txt
          echo "Found $(wc -l < sc_urls.txt) SoundCloud link(s)"

      - name: Dispatch to SoundCloud
        run: |
          while IFS= read -r URL; do
            if [[ -n "$URL" ]]; then
              echo "Dispatching: $URL"
              # اینجا از `uses` استفاده می‌کنیم، نه `gh workflow run`
              echo "url=${URL}" >> $GITHUB_OUTPUT
            fi
          done < sc_urls.txt

  call-soundcloud:
    needs: detect-and-dispatch
    if: always()
    uses: ./.github/workflows/platforms/soundcloud.yml
    with:
      url: ${{ needs.detect-and-dispatch.outputs.url }}
    secrets: inherit
