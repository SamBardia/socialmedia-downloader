name: Universal Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  detect-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract SoundCloud links
        id: extract
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          echo "$MSG" | grep -oP 'sc:\s*https?://[^\s]+' > sc_urls.txt

      - name: Setup dependencies (shared cache)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install yt-dlp

      - name: Process SoundCloud links
        run: |
          while IFS= read -r line; do
            URL=$(echo "$line" | sed 's/^sc:\s*//')
            echo "Processing SoundCloud: $URL"
            if [[ "$URL" == *"/sets/"* ]]; then
              echo "Type: album"
              chmod +x scripts/soundcloud/album.sh
              ./scripts/soundcloud/album.sh "$URL"
            else
              echo "Type: single"
              chmod +x scripts/soundcloud/single.sh
              ./scripts/soundcloud/single.sh "$URL"
            fi
          done < sc_urls.txt

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/soundcloud/
          git commit -m "Add SoundCloud content [skip ci]" || echo "No changes"
          git push

      - name: List files
        run: |
          echo "Files in downloads/soundcloud/:"
          ls -la downloads/soundcloud/
