name: Universal Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Enter URLs (one per line, or separated by space/comma)'
        required: true
        type: string
      twitter_profile_count:
        description: 'Number of tweets for Twitter profile (max 50)'
        required: false
        default: '20'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore timestamp cache
        uses: actions/cache/restore@v4
        with:
          path: .links_cache.txt
          key: links-cache-${{ github.run_id }}
          restore-keys: |
            links-cache-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq bc wget aria2
          pip install yt-dlp

      - name: Make scripts executable
        run: |
          chmod +x scripts/soundcloud/*.sh 2>/dev/null || true
          chmod +x scripts/twitter/*.sh 2>/dev/null || true
          chmod +x scripts/youtube/*.sh 2>/dev/null || true
          chmod +x scripts/instagram/*.sh 2>/dev/null || true
          chmod +x scripts/tiktok/*.sh 2>/dev/null || true
          chmod +x scripts/downloader-core.sh 2>/dev/null || true
          chmod +x scripts/create_links.sh 2>/dev/null || true

      - name: Setup YouTube Cookies (if exists)
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube_cookies.txt
          else
            touch youtube_cookies.txt
          fi

      - name: Process URLs with integrated splitting
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          TWITTER_PROFILE_COUNT: ${{ github.event.inputs.twitter_profile_count }}
          MAX_SIZE_MB: 90
        run: |
          split_large_file() {
            local file="$1"
            local max_mb="$2"
            local size=$(du -b "$file" | cut -f1)
            local max_bytes=$((max_mb * 1024 * 1024))
            if [ "$size" -gt "$max_bytes" ]; then
              echo "Splitting large file: $file (size=$(numfmt --to=iec $size))"
              local dir=$(dirname "$file")
              local base=$(basename "$file")
              local name_no_ext="${base%.*}"
              local temp_dir="$dir/split_temp_$$"
              mkdir -p "$temp_dir"
              mv "$file" "$temp_dir/"
              pushd "$temp_dir" > /dev/null
              zip -s "${max_mb}m" "${name_no_ext}.zip" "$base"
              rm -f "$base"
              mv "${name_no_ext}.zip"* "$dir/"
              popd > /dev/null
              rm -rf "$temp_dir"
              echo "Split complete. Parts:"
              ls -la "$dir/${name_no_ext}.zip"* 2>/dev/null | awk '{print "  " $9 " (" $5 " bytes)"}'
              return 0
            else
              echo "File size within limit, no split needed."
              return 0
            fi
          }

          mkdir -p tmp_downloads

          IFS=$'\n'
          for URL in $(echo "${{ github.event.inputs.urls }}" | tr ',' '\n' | tr ' ' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'); do
            [ -z "$URL" ] && continue
            echo "========================================="
            echo "Processing: $URL"
            echo "========================================="

            if [[ "$URL" =~ (youtube\.com|youtu\.be|soundcloud\.com|on\.soundcloud\.com|x\.com|twitter\.com|instagram\.com|tiktok\.com) ]]; then
              echo "Platform URL -> using existing scripts"
              ./scripts/downloader-core.sh "$URL"
            else
              echo "Direct file -> using aria2"
              aria2c --split=2 --max-connection-per-server=2 --dir="tmp_downloads" "$URL"
              for FILE in tmp_downloads/*; do
                if [ -f "$FILE" ]; then
                  FILENAME=$(basename "$FILE")
                  mkdir -p downloads/files
                  mv "$FILE" "downloads/files/$FILENAME"
                  # Immediately split if large
                  split_large_file "downloads/files/$FILENAME" "$MAX_SIZE_MB"
                  # Remove the original if split succeeded
                  if [ -f "downloads/files/${FILENAME%.*}.zip" ] || [ -f "downloads/files/${FILENAME%.*}.z01" ]; then
                    rm -f "downloads/files/$FILENAME"
                    echo "Removed original large file after splitting."
                  fi
                fi
              done
            fi

            # Update links and push
            ./scripts/create_links.sh
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add downloads/ Links.md Links.fa.md .links_cache.txt
            git diff --cached --quiet || git commit -m "Add downloaded content and update links [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          done
          rm -rf tmp_downloads

      - name: Final verification – split any leftover large files
        if: always()
        run: |
          MAX_SIZE_MB=90
          find downloads -type f -size +${MAX_SIZE_MB}M -print0 | while IFS= read -r -d '' file; do
            echo "Found leftover large file: $file – splitting now."
            dir=$(dirname "$file")
            base=$(basename "$file")
            name_no_ext="${base%.*}"
            temp_dir="$dir/split_temp_$$"
            mkdir -p "$temp_dir"
            mv "$file" "$temp_dir/"
            pushd "$temp_dir" > /dev/null
            zip -s "${MAX_SIZE_MB}m" "${name_no_ext}.zip" "$base"
            rm -f "$base"
            mv "${name_no_ext}.zip"* "$dir/"
            popd > /dev/null
            rm -rf "$temp_dir"
          done
          # Update links again
          ./scripts/create_links.sh

      - name: Final push (after splitting)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ Links.md Links.fa.md .links_cache.txt
          git diff --cached --quiet || git commit -m "Final update after splitting [skip ci]"
          git pull --rebase --autostash origin main || true
          git push

      - name: Save timestamp cache
        uses: actions/cache/save@v4
        with:
          path: .links_cache.txt
          key: links-cache-${{ github.run_id }}

      - name: Display summary
        run: |
          echo "========================================="
          echo "Download summary"
          echo "========================================="
          for dir in downloads/*/; do
            [ -d "$dir" ] && echo "$(basename "$dir"): $(ls -1 "$dir" | wc -l) items"
          done
