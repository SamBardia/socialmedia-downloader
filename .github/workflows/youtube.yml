name: YouTube Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================
      # Get the commit message
      # ============================================
      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ============================================
      # Extract all YouTube URLs with quality
      # ============================================
      - name: Extract all YouTube URLs
        id: extract
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          
          # Initialize arrays
          declare -A quality_urls
          
          # Define quality patterns
          patterns=(
            "yt-144:"
            "yt-240:"
            "yt-360:"
            "yt-480:"
            "yt-720:"
            "yt-1080:"
            "yt-best:"
            "yt-audio:"
          )
          
          for pattern in "${patterns[@]}"; do
            quality="${pattern#yt-}"
            quality="${quality%:}"
            # Extract URLs for this pattern
            urls=$(echo "$MSG" | grep -oP "${pattern}\s*\Khttps?://[^\s]+" || true)
            if [ -n "$urls" ]; then
              quality_urls["$quality"]="$urls"
              echo "Found $pattern $urls"
            fi
          done
          
          # Save to output
          for quality in "${!quality_urls[@]}"; do
            echo "url_${quality}=${quality_urls[$quality]}" >> $GITHUB_OUTPUT
          done
          
          if [ ${#quality_urls[@]} -gt 0 ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      # ============================================
      # Install dependencies
      # ============================================
      - name: Install dependencies
        if: steps.extract.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install --no-deps yt-dlp
          pip install brotlicffi

      # ============================================
      # Process each YouTube URL
      # ============================================
      - name: Process YouTube URLs
        if: steps.extract.outputs.found == 'true'
        run: |
          chmod +x scripts/youtube/single-video.sh
          
          # Process each quality level
          for quality in 144 240 360 480 720 1080 best audio; do
            url_var="url_${quality}"
            urls="${{ steps.extract.outputs[url_var] }}"
            if [ -n "$urls" ]; then
              echo "$urls" | while read -r URL; do
                [ -z "$URL" ] && continue
                echo ""
                echo "========================================="
                echo "Processing: $URL with quality $quality"
                echo "========================================="
                ./scripts/youtube/single-video.sh "$URL" "$quality"
              done
            fi
          done

      # ============================================
      # Push to repository
      # ============================================
      - name: Push to repository
        if: steps.extract.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add downloads/youtube/
          git commit -m "Add YouTube content [skip ci]" || echo "No changes to commit"
          git push

      # ============================================
      # List downloaded files
      # ============================================
      - name: List downloaded files
        if: steps.extract.outputs.found == 'true'
        run: |
          echo "========================================="
          echo "Files in downloads/youtube/:"
          echo "========================================="
          ls -la downloads/youtube/
