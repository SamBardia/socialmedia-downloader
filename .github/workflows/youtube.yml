name: YouTube Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================
      # Get the commit message
      # ============================================
      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ============================================
      # Extract all YouTube URLs with quality
      # ============================================
      - name: Extract all YouTube URLs
        id: extract
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          
          if echo "$MSG" | grep -q 'yt-144:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-144:\s*\Khttps?://[^\s]+')
            echo "url_144=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-240:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-240:\s*\Khttps?://[^\s]+')
            echo "url_240=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-360:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-360:\s*\Khttps?://[^\s]+')
            echo "url_360=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-480:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-480:\s*\Khttps?://[^\s]+')
            echo "url_480=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-720:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-720:\s*\Khttps?://[^\s]+')
            echo "url_720=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-1080:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-1080:\s*\Khttps?://[^\s]+')
            echo "url_1080=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-best:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-best:\s*\Khttps?://[^\s]+')
            echo "url_best=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-audio:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-audio:\s*\Khttps?://[^\s]+')
            echo "url_audio=$urls" >> $GITHUB_OUTPUT
          fi
          
          if grep -q "url_" $GITHUB_OUTPUT; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      # ============================================
      # Install dependencies
      # ============================================
      - name: Install dependencies
        if: steps.extract.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install --no-deps yt-dlp
          pip install brotlicffi

      # ============================================
      # Process all YouTube URLs (secure cookie handling)
      # ============================================
      - name: Process all YouTube URLs
        if: steps.extract.outputs.found == 'true'
        run: |
          # Create temporary secure cookie file (not in workspace)
          COOKIE_FILE=$(mktemp)
          echo "${{ secrets.YOUTUBE_COOKIES }}" > "$COOKIE_FILE"
          
          chmod +x scripts/youtube/single-video.sh
          
          # Process 144p
          if [ -n "${{ steps.extract.outputs.url_144 }}" ]; then
            echo "${{ steps.extract.outputs.url_144 }}" | while read -r URL; do
              [ -z "$URL" ] && continue
              ./scripts/youtube/single-video.sh "$URL" "144" "$COOKIE_FILE"
            done
          fi
          
          # Process 240p
          if [ -n "${{ steps.extract.outputs.url_240 }}" ]; then
            echo "${{ steps.extract.outputs.url_240 }}" | while read -r URL; do
              [ -z "$URL" ] && continue
              ./scripts/youtube/single-video.sh "$URL" "240" "$COOKIE_FILE"
            done
          fi
          
          # Process 360p
          if [ -n "${{ steps.extract.outputs.url_360 }}" ]; then
            echo "${{ steps.extract.outputs.url_360 }}" | while read -r URL; do
              [ -z "$URL" ] && continue
              ./scripts/youtube/single-video.sh "$URL" "360" "$COOKIE_FILE"
            done
          fi
          
          # Process 480p
          if [ -n "${{ steps.extract.outputs.url_480 }}" ]; then
            echo "${{ steps.extract.outputs.url_480 }}" | while read -r URL; do
              [ -z "$URL" ] && continue
              ./scripts/youtube/single-video.sh "$URL" "480" "$COOKIE_FILE"
            done
          fi
          
          # Process 720p
          if [ -n "${{ steps.extract.outputs.url_720 }}" ]; then
            echo "${{ steps.extract.outputs.url_720 }}" | while read -r URL; do
              [ -z "$URL" ] && continue
              ./scripts/youtube/single-video.sh "$URL" "720" "$COOKIE_FILE"
            done
          fi
          
          # Process 1080p
          if [ -n "${{ steps.extract.outputs.url_1080 }}" ]; then
            echo "${{ steps.extract.outputs.url_1080 }}" | while read -r URL; do
              [ -z "$URL" ] && continue
              ./scripts/youtube/single-video.sh "$URL" "1080" "$COOKIE_FILE"
            done
          fi
          
          # Process best quality
          if [ -n "${{ steps.extract.outputs.url_best }}" ]; then
            echo "${{ steps.extract.outputs.url_best }}" | while read -r URL; do
              [ -z "$URL" ] && continue
              ./scripts/youtube/single-video.sh "$URL" "best" "$COOKIE_FILE"
            done
          fi
          
          # Process audio only
          if [ -n "${{ steps.extract.outputs.url_audio }}" ]; then
            echo "${{ steps.extract.outputs.url_audio }}" | while read -r URL; do
              [ -z "$URL" ] && continue
              ./scripts/youtube/single-video.sh "$URL" "audio" "$COOKIE_FILE"
            done
          fi
          
          # Securely delete cookie file
          shred -u "$COOKIE_FILE" 2>/dev/null || rm -f "$COOKIE_FILE"

      # ============================================
      # Push to repository
      # ============================================
      - name: Push to repository
        if: steps.extract.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add downloads/
          git commit -m "Add YouTube content [skip ci]" || echo "No changes to commit"
          git push

      # ============================================
      # List downloaded files
      # ============================================
      - name: List downloaded files
        if: steps.extract.outputs.found == 'true'
        run: |
          echo "Files in downloads/youtube/:"
          ls -la downloads/youtube/ || echo "No files found"
