name: YouTube Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================
      # Get the commit message
      # ============================================
      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ============================================
      # Extract all YouTube URLs with quality
      # ============================================
      - name: Extract all YouTube URLs
        id: extract
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          
          # Extract URLs for each quality
          if echo "$MSG" | grep -q 'yt-144:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-144:\s*\Khttps?://[^\s]+')
            echo "url_144=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-240:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-240:\s*\Khttps?://[^\s]+')
            echo "url_240=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-360:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-360:\s*\Khttps?://[^\s]+')
            echo "url_360=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-480:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-480:\s*\Khttps?://[^\s]+')
            echo "url_480=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-720:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-720:\s*\Khttps?://[^\s]+')
            echo "url_720=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-1080:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-1080:\s*\Khttps?://[^\s]+')
            echo "url_1080=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-best:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-best:\s*\Khttps?://[^\s]+')
            echo "url_best=$urls" >> $GITHUB_OUTPUT
          fi
          
          if echo "$MSG" | grep -q 'yt-audio:'; then
            urls=$(echo "$MSG" | grep -oP 'yt-audio:\s*\Khttps?://[^\s]+')
            echo "url_audio=$urls" >> $GITHUB_OUTPUT
          fi
          
          if grep -q "url_" $GITHUB_OUTPUT; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      # ============================================
      # Install dependencies
      # ============================================
      - name: Install dependencies
        if: steps.extract.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install --no-deps yt-dlp
          pip install brotlicffi

      # ============================================
      # Process all YouTube URLs
      # ============================================
      - name: Process all YouTube URLs
        if: steps.extract.outputs.found == 'true'
        run: |
          # Create cookie file from secret
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
          
          chmod +x scripts/youtube/single-video.sh
          
          # Process 480p (example)
          if [ -n "${{ steps.extract.outputs.url_480 }}" ]; then
            echo "${{ steps.extract.outputs.url_480 }}" | while read -r URL; do
              [ -z "$URL" ] && continue
              echo "Processing 480p: $URL"
              ./scripts/youtube/single-video.sh "$URL" "480" "cookies.txt"
            done
          fi
          
          # Clean up
          rm -f cookies.txt

      # ============================================
      # Push to repository
      # ============================================
      - name: Push to repository
        if: steps.extract.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add downloads/
          git commit -m "Add YouTube content [skip ci]" || echo "No changes to commit"
          git push

      # ============================================
      # List downloaded files
      # ============================================
      - name: List downloaded files
        if: steps.extract.outputs.found == 'true'
        run: |
          echo "Files in downloads/youtube/:"
          ls -la downloads/youtube/ || echo "No files found"
