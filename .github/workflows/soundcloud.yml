name: Download from SoundCloud

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Find SoundCloud link and type
        id: find
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          URL=$(echo "$MSG" | grep -oP 'sc:\s*\Khttps?://[^\s]+' | head -1)
          if [[ -n "$URL" ]]; then
            echo "url=$URL" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
            if [[ "$URL" == *"/sets/"* ]]; then
              echo "type=album" >> $GITHUB_OUTPUT
            else
              echo "type=single" >> $GITHUB_OUTPUT
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.find.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip
          pip install yt-dlp

      - name: Run download script
        if: steps.find.outputs.found == 'true'
        run: |
          chmod +x scripts/soundcloud/single-track.sh
          chmod +x scripts/soundcloud/album.sh
          if [[ "${{ steps.find.outputs.type }}" == "album" ]]; then
            ./scripts/soundcloud/album.sh "${{ steps.find.outputs.url }}"
          else
            ./scripts/soundcloud/single-track.sh "${{ steps.find.outputs.url }}"
          fi

      - name: Push to repository
        if: steps.find.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f downloads/soundcloud/
          git commit -m "Add SoundCloud content [skip ci]" || echo "No changes to commit"
          git push

      - name: List files
        if: steps.find.outputs.found == 'true'
        run: |
          echo "Files in downloads/soundcloud/:"
          ls -la downloads/soundcloud/
