name: SoundCloud Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================
      # Get the commit message
      # ============================================
      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ============================================
      # Extract all SoundCloud URLs from commit message
      # ============================================
      - name: Extract all SoundCloud URLs
        id: extract
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          URLS=$(echo "$MSG" | grep -oP 'sc:\s*\Khttps?://[^\s]+')
          if [ -n "$URLS" ]; then
            echo "urls<<EOF" >> $GITHUB_OUTPUT
            echo "$URLS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
            echo "count=$(echo "$URLS" | wc -l)" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      # ============================================
      # Install dependencies (ffmpeg, zip, yt-dlp)
      # ============================================
      - name: Install dependencies
        if: steps.extract.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install yt-dlp

      # ============================================
      # Process each URL (single, album, or playlist)
      # ============================================
      - name: Process all URLs
        if: steps.extract.outputs.found == 'true'
        run: |
          # Make scripts executable
          chmod +x scripts/soundcloud/single.sh
          chmod +x scripts/soundcloud/album.sh
          chmod +x scripts/soundcloud/playlist.sh
          
          # Process each URL line by line
          echo "${{ steps.extract.outputs.urls }}" | while read -r URL; do
            [ -z "$URL" ] && continue
            
            echo ""
            echo "========================================="
            echo "Processing: $URL"
            echo "========================================="
            
            # Detect content type based on URL pattern
            if [[ "$URL" =~ ^https://soundcloud\.com/[^/]+/[^/]+$ ]] && [[ "$URL" != *"/sets/"* ]]; then
              echo "Type: Single Track"
              ./scripts/soundcloud/single.sh "$URL"
              
            elif [[ "$URL" == *"/sets/"* ]]; then
              # Get metadata to distinguish between album and playlist
              INFO=$(python3 -m yt_dlp --skip-download --dump-json "$URL" 2>/dev/null)
              TITLE=$(echo "$INFO" | jq -r '.playlist_title // empty')
              COUNT=$(echo "$INFO" | jq -r '.playlist_count // 0')
              
              # Playlist detection: Persian title OR more than 25 tracks
              if echo "$TITLE" | grep -qP '[\x{0600}-\x{06FF}]' || [ "$COUNT" -gt 25 ]; then
                echo "Type: Playlist"
                ./scripts/soundcloud/playlist.sh "$URL"
              else
                echo "Type: Album"
                ./scripts/soundcloud/album.sh "$URL"
              fi
            else
              echo "Type: Single Track"
              ./scripts/soundcloud/single.sh "$URL"
            fi
            
            echo "Completed: $URL"
          done

      # ============================================
      # Push downloaded files to repository
      # ============================================
      - name: Push to repository
        if: steps.extract.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config.user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/soundcloud/
          git commit -m "Add SoundCloud content [skip ci]" || echo "No changes to commit"
          git push

      # ============================================
      # List downloaded files
      # ============================================
      - name: List downloaded files
        if: steps.extract.outputs.found == 'true'
        run: |
          echo "========================================="
          echo "Files in downloads/soundcloud/:"
          echo "========================================="
          ls -la downloads/soundcloud/
