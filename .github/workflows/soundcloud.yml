name: Download from SoundCloud

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Find SoundCloud link
        id: find
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          URL=$(echo "$MSG" | grep -oP 'sc:\s*\Khttps?://[^\s]+' | head -1)
          if [[ -n "$URL" ]]; then
            echo "url=$URL" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Cache pip packages
        if: steps.find.outputs.found == 'true'
        id: cache-pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-soundcloud-${{ hashFiles('requirements/soundcloud.txt') }}

      - name: Install dependencies
        if: steps.find.outputs.found == 'true' && steps.cache-pip.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements/soundcloud.txt

      - name: Ensure yt-dlp is in PATH
        if: steps.find.outputs.found == 'true'
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"

      - name: Run download script
        if: steps.find.outputs.found == 'true'
        run: |
          chmod +x scripts/soundcloud/single-track.sh
          ./scripts/soundcloud/single-track.sh "${{ steps.find.outputs.url }}"

      - name: Push to repository
        if: steps.find.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config.user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/soundcloud/
          git commit -m "Add SoundCloud track [skip ci]" || echo "No changes"
          git push
