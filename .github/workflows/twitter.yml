name: Twitter Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================
      # Get the commit message
      # ============================================
      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ============================================
      # Extract all Twitter URLs from commit message
      # ============================================
      - name: Extract all Twitter URLs
        id: extract
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          URLS=$(echo "$MSG" | grep -oP 'tw:\s*\Khttps?://[^\s]+')
          if [ -n "$URLS" ]; then
            echo "urls<<EOF" >> $GITHUB_OUTPUT
            echo "$URLS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
            echo "count=$(echo "$URLS" | wc -l)" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      # ============================================
      # Install dependencies
      # ============================================
      - name: Install dependencies
        if: steps.extract.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install yt-dlp

      # ============================================
      # Process all Twitter URLs
      # ============================================
      - name: Process all Twitter URLs
        if: steps.extract.outputs.found == 'true'
        run: |
          # Make script executable
          chmod +x scripts/twitter/single-tweet.sh
          
          echo "${{ steps.extract.outputs.urls }}" | while read -r URL; do
            [ -z "$URL" ] && continue
            
            echo ""
            echo "========================================="
            echo "Processing: $URL"
            echo "========================================="
            echo "Type: Single Tweet"
            
            ./scripts/twitter/single-tweet.sh "$URL"
            
            echo "Completed: $URL"
          done

      # ============================================
      # Push downloaded files to repository
      # ============================================
      - name: Push to repository
        if: steps.extract.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add downloads/twitter/
          git commit -m "Add Twitter content [skip ci]" || echo "No changes to commit"
          git push

      # ============================================
      # List downloaded files
      # ============================================
      - name: List downloaded files
        if: steps.extract.outputs.found == 'true'
        run: |
          echo "========================================="
          echo "Files in downloads/twitter/:"
          echo "========================================="
          ls -la downloads/twitter/
