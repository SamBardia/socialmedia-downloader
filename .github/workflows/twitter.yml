name: Twitter Downloader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get commit message
        id: message
        run: |
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract all Twitter URLs
        id: extract
        run: |
          MSG="${{ steps.message.outputs.msg }}"
          URLS=$(echo "$MSG" | grep -oP 'tw:\s*\Khttps?://[^\s]+')
          if [ -n "$URLS" ]; then
            echo "urls<<EOF" >> $GITHUB_OUTPUT
            echo "$URLS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Find fastest Ubuntu mirror
        if: steps.extract.outputs.found == 'true'
        id: mirror
        run: |
          sudo sed -i 's|azure.archive.ubuntu.com/ubuntu|archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list
          sudo apt-get update

      - name: Install dependencies
        if: steps.extract.outputs.found == 'true'
        run: |
          sudo apt-get install -y --no-install-recommends ffmpeg zip jq
          pip install --no-deps yt-dlp
          pip install brotlicffi

      - name: Process all URLs
        if: steps.extract.outputs.found == 'true'
        run: |
          chmod +x scripts/twitter/single-tweet.sh
          echo "${{ steps.extract.outputs.urls }}" | while read -r URL; do
            [ -z "$URL" ] && continue
            echo "Processing: $URL"
            ./scripts/twitter/single-tweet.sh "$URL"
          done

      - name: Push to repository
        if: steps.extract.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/twitter/
          git commit -m "Add Twitter content [skip ci]" || echo "No changes"
          git push
