name: Twitter Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Twitter URLs (one per line)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================
      # Install dependencies
      # ============================================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install yt-dlp

      # ============================================
      # Process all Twitter URLs
      # ============================================
      - name: Process all Twitter URLs
        run: |
          chmod +x scripts/twitter/single-tweet.sh
          
          echo "${{ github.event.inputs.urls }}" | while read -r URL; do
            [ -z "$URL" ] && continue
            
            echo ""
            echo "========================================="
            echo "Processing: $URL"
            echo "========================================="
            
            ./scripts/twitter/single-tweet.sh "$URL"
            
            echo "Completed: $URL"
          done

      # ============================================
      # Push downloaded files to repository
      # ============================================
      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/twitter/
          git commit -m "Add Twitter content [skip ci]" || echo "No changes to commit"
          git push

      # ============================================
      # List downloaded files
      # ============================================
      - name: List downloaded files
        run: |
          echo "========================================="
          echo "Files in downloads/twitter/:"
          echo "========================================="
          ls -la downloads/twitter/
