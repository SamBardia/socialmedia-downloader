name: SoundCloud Platform

on:
  workflow_call:
    inputs:
      url:
        required: true
        type: string
      type:
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run script
        run: |
          chmod +x scripts/soundcloud/${{ inputs.type }}.sh
          ./scripts/soundcloud/${{ inputs.type }}.sh "${{ inputs.url }}"

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/soundcloud/
          git commit -m "Add SoundCloud content [skip ci]" || echo "No changes"
          git push
