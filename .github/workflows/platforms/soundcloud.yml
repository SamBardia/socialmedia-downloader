name: SoundCloud Platform

on:
  workflow_call:
    inputs:
      url:
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get URL
        id: url
        run: |
          URL="${{ inputs.url }}"
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Detect content type
        id: detect
        run: |
          URL="${{ steps.url.outputs.url }}"
          
          # Single track detection
          if [[ "$URL" =~ ^https://soundcloud\.com/[^/]+/[^/]+$ ]] && [[ "$URL" != *"/sets/"* ]] && [[ "$URL" != *"/playlists/"* ]]; then
            echo "type=single" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Album or playlist detection
          if [[ "$URL" == *"/sets/"* ]]; then
            INFO=$(python3 -m yt_dlp --skip-download --dump-json "$URL" 2>/dev/null)
            PLAYLIST_TITLE=$(echo "$INFO" | jq -r '.playlist_title // empty')
            
            if echo "$PLAYLIST_TITLE" | grep -qP '[\x{0600}-\x{06FF}]'; then
              echo "type=playlist" >> $GITHUB_OUTPUT
            else
              echo "type=album" >> $GITHUB_OUTPUT
            fi
          else
            echo "type=single" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install yt-dlp

      - name: Run script
        run: |
          URL="${{ steps.url.outputs.url }}"
          TYPE="${{ steps.detect.outputs.type }}"
          
          chmod +x scripts/soundcloud/single.sh
          chmod +x scripts/soundcloud/album.sh
          chmod +x scripts/soundcloud/playlist.sh
          
          case "$TYPE" in
            "single") ./scripts/soundcloud/single.sh "$URL" ;;
            "album")  ./scripts/soundcloud/album.sh "$URL" ;;
            "playlist") ./scripts/soundcloud/playlist.sh "$URL" ;;
          esac

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/soundcloud/
          git commit -m "Add SoundCloud content [skip ci]" || echo "No changes to commit"
          git push
