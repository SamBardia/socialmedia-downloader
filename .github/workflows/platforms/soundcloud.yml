name: SoundCloud Platform

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get URL
        id: url
        run: |
          URL="${{ github.event.inputs.url }}"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Processing: $URL"

      - name: Detect content type
        id: detect
        run: |
          URL="${{ steps.url.outputs.url }}"
          
          # Single track detection
          if [[ "$URL" =~ ^https://soundcloud\.com/[^/]+/[^/]+$ ]] && [[ "$URL" != *"/sets/"* ]] && [[ "$URL" != *"/playlists/"* ]]; then
            echo "type=single" >> $GITHUB_OUTPUT
            echo "Detected: single track"
            exit 0
          fi
          
          # Album or playlist detection (both use /sets/)
          if [[ "$URL" == *"/sets/"* ]]; then
            # Try to get metadata to distinguish
            INFO=$(python3 -m yt_dlp --skip-download --dump-json "$URL" 2>/dev/null)
            UPLOADER=$(echo "$INFO" | jq -r '.uploader // empty')
            PLAYLIST_TITLE=$(echo "$INFO" | jq -r '.playlist_title // empty')
            TRACK_COUNT=$(echo "$INFO" | jq -r '.playlist_count // 0')
            
            # If playlist_title contains Persian characters or track count > 20, it's likely a playlist
            if echo "$PLAYLIST_TITLE" | grep -qP '[\x{0600}-\x{06FF}]'; then
              echo "type=playlist" >> $GITHUB_OUTPUT
              echo "Detected: playlist (Persian title)"
            elif [ "$TRACK_COUNT" -gt 20 ]; then
              echo "type=playlist" >> $GITHUB_OUTPUT
              echo "Detected: playlist (more than 20 tracks)"
            elif [[ -n "$UPLOADER" ]] && [[ "$PLAYLIST_TITLE" != "$UPLOADER"* ]]; then
              echo "type=playlist" >> $GITHUB_OUTPUT
              echo "Detected: playlist (different from uploader)"
            else
              echo "type=album" >> $GITHUB_OUTPUT
              echo "Detected: album"
            fi
          else
            echo "type=single" >> $GITHUB_OUTPUT
            echo "Detected: single track (fallback)"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install yt-dlp

      - name: Run script
        run: |
          URL="${{ steps.url.outputs.url }}"
          TYPE="${{ steps.detect.outputs.type }}"
          
          chmod +x scripts/soundcloud/single.sh 2>/dev/null || true
          chmod +x scripts/soundcloud/album.sh 2>/dev/null || true
          chmod +x scripts/soundcloud/playlist.sh 2>/dev/null || true
          
          case "$TYPE" in
            "single")
              echo "Running single.sh for: $URL"
              ./scripts/soundcloud/single.sh "$URL"
              ;;
            "album")
              echo "Running album.sh for: $URL"
              ./scripts/soundcloud/album.sh "$URL"
              ;;
            "playlist")
              echo "Running playlist.sh for: $URL"
              ./scripts/soundcloud/playlist.sh "$URL"
              ;;
          esac

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/soundcloud/
          git commit -m "Add SoundCloud content [skip ci]" || echo "No changes to commit"
          git push
