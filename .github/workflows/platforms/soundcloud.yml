name: SoundCloud Platform

on:
  workflow_call:
    inputs:
      url:
        required: true
        type: string
      type:
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip
          pip install yt-dlp

      - name: Run script
        run: |
          if [[ "${{ inputs.type }}" == "single" ]]; then
            chmod +x scripts/soundcloud/single.sh
            ./scripts/soundcloud/single.sh "${{ inputs.url }}"
          else
            chmod +x scripts/soundcloud/album.sh
            ./scripts/soundcloud/album.sh "${{ inputs.url }}"
          fi

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/soundcloud/
          git commit -m "Add SoundCloud content [skip ci]" || echo "No changes"
          git push
