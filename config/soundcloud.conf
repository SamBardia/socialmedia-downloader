# SoundCloud Configuration File

# Audio format (mp3, m4a, best)
AUDIO_FORMAT="mp3"

# Audio quality (0 = best, 10 = worst, or bitrate like 128K)
AUDIO_QUALITY="0"

# Max ZIP file size in MB (for splitting large files)
MAX_ZIP_SIZE_MB="90"

# Split large ZIP files into parts (true/false)
SPLIT_LARGE_FILES="true"

# Download path
DOWNLOAD_PATH="downloads/soundcloud"

# Archive file to avoid re-downloading same tracks (leave empty to disable)
ARCHIVE_FILE=""

# Show artist name in album track filenames (true/false)
SHOW_ARTIST_NAME_IN_ALBUM="true"

# Space replacement character in filenames
SPACE_REPLACEMENT="_"
